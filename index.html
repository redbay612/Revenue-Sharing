<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分帳小幫手 - 精準同步版</title>
    <style>
        :root { --p: #4f46e5; --s: #10b981; --d: #ef4444; --bg: #f3f4f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1f2937; line-height: 1.5; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin: 0 0 15px 0; font-size: 1.1rem; color: var(--p); display: flex; align-items: center; gap: 8px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .btn { border: none; padding: 12px; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 8px; transition: 0.2s; font-size: 1rem; }
        .btn-p { background: var(--p); }
        .btn-s { background: var(--s); }
        .btn-d { background: var(--d); }
        .btn-o { background: white; color: var(--p); border: 1px solid var(--p); }
        .btn:active { transform: scale(0.98); }
        
        /* 成員標籤樣式 */
        .member-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .member-tag { background: #eef2ff; border: 1px solid #c7d2fe; color: #4338ca; padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .edit-icon { cursor: pointer; font-size: 0.8rem; background: #c7d2fe; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #f3f4f6; }
        .flex { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        .group-item { padding: 15px; border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 12px; cursor: pointer; }
        .group-item:hover { border-color: var(--p); background: #f9fafb; }
        .settle-box { background: #ecfdf5; padding: 15px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--s); }
        .checkbox-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; padding: 10px 0; }
    </style>
</head>
<body>

<!-- 頁面 1: 專案清單 -->
<div id="listPage">
    <div class="card">
        <h2>📂 我的分帳專案</h2>
        <input type="text" id="newGroupName" placeholder="例如：2024 日本旅遊">
        <button class="btn btn-p" onclick="addGroup()">建立新專案</button>
        <button class="btn btn-o" onclick="importFromCode()">📥 匯入朋友傳來的同步碼</button>
    </div>
    <div id="groupList"></div>
</div>

<!-- 頁面 2: 專案詳情 -->
<div id="detailPage" style="display:none;">
    <button class="btn btn-o" onclick="showList()" style="width:auto; margin-bottom:15px;">← 返回列表</button>
    
    <div class="card">
        <h2 id="currentTitle">專案名稱</h2>
        <button class="btn btn-s" onclick="exportToCode()">🔗 產生同步碼 (傳給朋友同步)</button>
    </div>

    <!-- 成員管理區 -->
    <div class="card">
        <h2>👥 成員管理</h2>
        <div class="member-list" id="memberTags"></div>
        <div class="flex">
            <input type="text" id="newMemberName" placeholder="輸入新成員姓名" style="margin:0;">
            <button class="btn btn-p" onclick="addMember()" style="width:auto; margin:0;">新增</button>
        </div>
        <p style="font-size:0.75rem; color:#6b7280; margin-top:8px;">* 點擊成員名字可「修改姓名」，帳目會自動連動更新。</p>
    </div>

    <div class="card">
        <h2>💰 新增支出</h2>
        <input type="hidden" id="editIdx" value="-1">
        <input type="text" id="expDesc" placeholder="項目內容 (如：午餐)">
        <input type="number" id="expAmt" placeholder="金額">
        <label style="font-size:0.85rem; color:#666;">付款人：</label>
        <select id="expPayer"></select>
        <label style="font-size:0.85rem; color:#666;">分攤對象：</label>
        <div id="splitCheckboxes" class="checkbox-group"></div>
        <button class="btn btn-p" id="saveExpBtn" onclick="saveExp()">儲存支出</button>
    </div>

    <div class="card">
        <h2>📊 結算報告</h2>
        <div id="settleResults" class="settle-box"></div>
    </div>

    <div class="card">
        <h2>📝 支出明細</h2>
        <div style="overflow-x:auto;">
            <table id="expTable">
                <thead><tr><th>項目</th><th>金額</th><th>付款人</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let groups = JSON.parse(localStorage.getItem('split_v2_data')) || [];
let curId = null;

// --- 專案管理 ---
function addGroup() {
    const name = document.getElementById('newGroupName').value;
    if (!name) return;
    const newGroup = { id: Date.now(), name, members: [], exps: [] };
    groups.push(newGroup);
    save(); renderList();
    document.getElementById('newGroupName').value = "";
}

function renderList() {
    const list = document.getElementById('groupList');
    list.innerHTML = "";
    groups.forEach(g => {
        list.innerHTML += `
            <div class="card group-item" onclick="showDetail(${g.id})">
                <div class="flex">
                    <strong>${g.name}</strong>
                    <button class="btn btn-d" style="width:auto; padding:4px 8px; font-size:0.8rem;" onclick="deleteGroup(${g.id}, event)">刪除</button>
                </div>
                <div style="font-size:0.85rem; color:#6b7280; margin-top:8px;">
                    👥 ${g.members.length} 位成員 | 📝 ${g.exps.length} 筆紀錄
                </div>
